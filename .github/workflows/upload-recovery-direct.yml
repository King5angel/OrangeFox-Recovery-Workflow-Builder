name: Upload Custom Recovery Direct

on:
  workflow_dispatch:
    inputs:
      DEVICE:
        description: 'Selecciona tu dispositivo'
        required: true
        type: choice
        options:
          - nokia_cap_sprout
          - xiaomi_joyeuse
          - samsung_d1
          - xiaomi_alioth
          - xiaomi_surya
          - custom
      DEVICE_NAME:
        description: 'Nombre del dispositivo (si es custom)'
        required: false
        type: string
      RECOVERY_NAME:
        description: 'Nombre para el recovery'
        required: true
        type: string
        default: 'recovery'
      UPLOAD_URL:
        description: 'URL donde esta tu recovery.img (ej: Google Drive, OneDrive, etc)'
        required: false
        type: string
      DESCRIPTION:
        description: 'Descripción del recovery'
        required: false
        type: string
        default: 'Custom Recovery Build'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      device_name: ${{ steps.config.outputs.device_name }}
      codename: ${{ steps.config.outputs.codename }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Load Device Config
        id: config
        run: |
          DEVICE="${{ github.event.inputs.DEVICE }}"
          
          if [ "$DEVICE" == "custom" ]; then
            DEVICE_NAME="${{ github.event.inputs.DEVICE_NAME }}"
            if [ -z "$DEVICE_NAME" ]; then
              DEVICE_NAME="Custom Device"
            fi
            CODENAME="custom"
          else
            CONFIG=$(cat devices/devices.json | jq -r ".\"$DEVICE\"")
            DEVICE_NAME=$(echo $CONFIG | jq -r '.name')
            CODENAME=$(echo $CONFIG | jq -r '.codename')
          fi
          
          echo "device_name=$DEVICE_NAME" >> $GITHUB_OUTPUT
          echo "codename=$CODENAME" >> $GITHUB_OUTPUT

  upload:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Show Info
        run: |
          echo "===================================="
          echo "UPLOAD CUSTOM RECOVERY"
          echo "===================================="
          echo ""
          echo "Dispositivo: ${{ needs.setup.outputs.device_name }}"
          echo "Codename: ${{ needs.setup.outputs.codename }}"
          echo "Nombre: ${{ github.event.inputs.RECOVERY_NAME }}"
          echo "Descripción: ${{ github.event.inputs.DESCRIPTION }}"
          echo ""

      - name: Download from URL
        id: download
        if: github.event.inputs.UPLOAD_URL != ''
        run: |
          mkdir -p artifacts
          URL="${{ github.event.inputs.UPLOAD_URL }}"
          
          echo "Descargando desde URL:"
          echo "$URL"
          
          # Descargar con curl
          curl -L -o artifacts/recovery.img "$URL" 2>&1 | tail -20
          
          if [ ! -f artifacts/recovery.img ]; then
            echo "ERROR: No se pudo descargar"
            exit 1
          fi
          
          SIZE=$(du -h artifacts/recovery.img | cut -f1)
          MD5=$(md5sum artifacts/recovery.img | awk '{print $1}')
          
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          
          echo ""
          echo "✓ Descargado: $SIZE"
          echo "✓ MD5: $MD5"

      - name: Create Template File
        id: template
        if: github.event.inputs.UPLOAD_URL == ''
        run: |
          mkdir -p artifacts
          
          cat > artifacts/recovery.img << 'EOF'
          TEMPLATE - Reemplaza con tu recovery.img
          
          Instrucciones:
          1. Descarga este archivo desde Releases
          2. Usa un editor binario (HxD, etc) o copia el contenido real
          3. Reemplaza este contenido con tu recovery.img real
          4. Sube el archivo via Git o web GitHub
          5. Vuelve a ejecutar este workflow
          
          O usa GUIA-SUBIR-RECOVERY.md para más opciones.
          EOF
          
          SIZE=$(du -h artifacts/recovery.img | cut -f1)
          MD5=$(md5sum artifacts/recovery.img | awk '{print $1}')
          
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT

      - name: Prepare Files
        run: |
          ls -lh artifacts/
          
          if [ ! -f artifacts/recovery.img ]; then
            echo "ERROR: recovery.img no encontrado"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/recovery.img
          tag_name: recovery-${{ needs.setup.outputs.codename }}-${{ github.event.inputs.RECOVERY_NAME }}-${{ github.run_number }}
          body: |
            📱 Custom Recovery Upload
            
            **Dispositivo:** ${{ needs.setup.outputs.device_name }}
            **Codename:** ${{ needs.setup.outputs.codename }}
            **Nombre:** ${{ github.event.inputs.RECOVERY_NAME }}
            
            **Información:**
            - Tamaño: ${{ steps.download.outputs.size }}${{ steps.template.outputs.size }}
            - MD5: ${{ steps.download.outputs.md5 }}${{ steps.template.outputs.md5 }}
            - Descripción: ${{ github.event.inputs.DESCRIPTION }}
            
            **Instalación:**
            ```bash
            adb reboot bootloader
            fastboot flash recovery recovery.img
            fastboot reboot
            ```
            
            **Cómo Subir tu Recovery Real:**
            
            Opción 1 - Desde URL:
            - Sube tu recovery.img a Google Drive, OneDrive, etc
            - Obtén URL compartible
            - Ejecuta este workflow con la URL
            
            Opción 2 - Desde tu PC (Git):
            - Copia recovery.img a tu carpeta del repo
            - git add recovery.img
            - git commit -m "Upload recovery"
            - git push
            - Luego ejecuta este workflow
            
            Ver GUIA-SUBIR-RECOVERY.md para más detalles.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo ""
          echo "✓ Recovery publicado en Releases"
          echo "✓ Disponible para descargar"
          echo ""
          if [ "${{ github.event.inputs.UPLOAD_URL }}" == "" ]; then
            echo "ℹ  Descargaste un template"
            echo "ℹ  Para subir tu recovery real:"
            echo "   - Opción URL: Proporciona una URL"
            echo "   - Opción Git: Sube via git y ejecuta workflow"
          fi
          echo ""
