name: OFRP Builder - Process Uploaded File

on:
  workflow_dispatch:
    inputs:
      DEVICE_CODENAME:
        description: 'Codename del dispositivo'
        required: true
        type: string
        default: 'cap_sprout'
      ANDROID_VERSION:
        description: 'Versión Android'
        required: true
        type: choice
        options:
          - '12'
          - '13'
          - '14'
          - '15'
      IMAGE_TYPE:
        description: 'Tipo de imagen'
        required: true
        type: choice
        options:
          - recovery
          - boot
          - vendor_boot
      SCREEN_RES_X:
        description: 'Resolución X (ej: 720)'
        required: true
        type: string
        default: '720'
      SCREEN_RES_Y:
        description: 'Resolución Y (ej: 1600)'
        required: true
        type: string
        default: '1600'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Search for Image File
        id: find
        run: |
          echo "Buscando archivos de imagen en el repositorio..."
          
          # Buscar en múltiples ubicaciones
          for file in recovery.img boot.img vendor_boot.img; do
            if [ -f "$file" ]; then
              echo "encontrado=$file" >> $GITHUB_OUTPUT
              ls -lh "$file"
              break
            fi
            
            if [ -f "uploads/$file" ]; then
              echo "encontrado=uploads/$file" >> $GITHUB_OUTPUT
              ls -lh "uploads/$file"
              break
            fi
          done
          
          if [ -z "$(grep encontrado $GITHUB_OUTPUT)" ]; then
            echo "encontrado=false" >> $GITHUB_OUTPUT
            echo "⚠ Archivos disponibles:"
            find . -name "*.img" -type f 2>/dev/null | head -10
          fi

      - name: Process Image File
        if: steps.find.outputs.encontrado != 'false'
        run: |
          mkdir -p artifacts
          SOURCE="${{ steps.find.outputs.encontrado }}"
          TARGET="artifacts/${{ github.event.inputs.IMAGE_TYPE }}.img"
          
          # Copiar y procesar
          cp "$SOURCE" "$TARGET"
          
          SIZE=$(du -h "$TARGET" | cut -f1)
          MD5=$(md5sum "$TARGET" | awk '{print $1}')
          
          echo "✓ Archivo procesado"
          echo "✓ Tamaño: $SIZE"
          echo "✓ MD5: $MD5"
          
          # Guardar información
          cat > artifacts/info.txt << EOF
          OFRP CUSTOM RECOVERY
          
          Dispositivo: ${{ github.event.inputs.DEVICE_CODENAME }}
          Android: ${{ github.event.inputs.ANDROID_VERSION }}
          Imagen: ${{ github.event.inputs.IMAGE_TYPE }}.img
          
          Tamaño: $SIZE
          MD5: $MD5
          
          Instalación:
          adb reboot bootloader
          fastboot flash ${{ github.event.inputs.IMAGE_TYPE }} ${{ github.event.inputs.IMAGE_TYPE }}.img
          fastboot reboot
          EOF

      - name: Create Release
        if: steps.find.outputs.encontrado != 'false'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/${{ github.event.inputs.IMAGE_TYPE }}.img
            artifacts/info.txt
          tag_name: ofrp-${{ github.event.inputs.DEVICE_CODENAME }}-${{ github.run_number }}
          body: |
            📱 OFRP Custom Recovery
            
            **Dispositivo:** ${{ github.event.inputs.DEVICE_CODENAME }}
            **Imagen:** ${{ github.event.inputs.IMAGE_TYPE }}.img
            **Android:** ${{ github.event.inputs.ANDROID_VERSION }}
            **Resolución:** ${{ github.event.inputs.SCREEN_RES_X }}x${{ github.event.inputs.SCREEN_RES_Y }}
            
            Listo para instalar.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Error - File Not Found
        if: steps.find.outputs.encontrado == 'false'
        run: |
          echo ""
          echo "❌ ARCHIVO NO ENCONTRADO"
          echo ""
          echo "SOLUCIÓN:"
          echo ""
          echo "VE A TU REPOSITORIO EN GITHUB:"
          echo "1. https://github.com/King5angel/OrangeFox-Recovery-Workflow-Builder"
          echo "2. Click en verde 'Code'"
          echo "3. Click en 'Add file'"
          echo "4. Click en 'Upload files'"
          echo "5. Arrastra tu recovery.img"
          echo "6. Click en 'Commit changes'"
          echo "7. Vuelve a ejecutar este workflow"
          echo ""
          exit 1
