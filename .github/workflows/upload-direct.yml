name: Upload Recovery Direct

on:
  workflow_dispatch:
    inputs:
      DEVICE:
        description: 'Selecciona tu dispositivo'
        required: true
        type: choice
        options:
          - nokia_cap_sprout
          - xiaomi_joyeuse
          - samsung_d1
          - custom
      DEVICE_NAME:
        description: 'Nombre del dispositivo'
        required: true
        type: string
        default: 'Mi Dispositivo'
      RECOVERY_URL:
        description: 'URL directa al recovery.img (Google Drive, OneDrive, etc)'
        required: true
        type: string
        placeholder: 'https://drive.google.com/uc?export=download&id=...'
      DESCRIPTION:
        description: 'Descripción del recovery'
        required: false
        type: string
        default: 'Custom Recovery'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Show Info
        run: |
          echo "=========================================="
          echo "UPLOAD RECOVERY DIRECTO"
          echo "=========================================="
          echo ""
          echo "Dispositivo: ${{ github.event.inputs.DEVICE_NAME }}"
          echo "URL: ${{ github.event.inputs.RECOVERY_URL }}"
          echo "Descripción: ${{ github.event.inputs.DESCRIPTION }}"
          echo ""

      - name: Download Recovery
        run: |
          mkdir -p artifacts
          
          echo "Descargando recovery.img desde URL..."
          echo "URL: ${{ github.event.inputs.RECOVERY_URL }}"
          
          # Intentar descarga con curl
          curl -L -o artifacts/recovery.img "${{ github.event.inputs.RECOVERY_URL }}" 2>&1 | tail -10
          
          # Verificar que se descargó
          if [ -f artifacts/recovery.img ]; then
            SIZE=$(du -h artifacts/recovery.img | cut -f1)
            MD5=$(md5sum artifacts/recovery.img | awk '{print $1}')
            
            echo ""
            echo "✓ Recovery descargado exitosamente"
            echo "✓ Tamaño: $SIZE"
            echo "✓ MD5: $MD5"
            
            # Guardar info en archivo
            cat > artifacts/info.txt << EOF
          Dispositivo: ${{ github.event.inputs.DEVICE_NAME }}
          Tamaño: $SIZE
          MD5: $MD5
          Descripción: ${{ github.event.inputs.DESCRIPTION }}
          Fecha: $(date)
          EOF
          else
            echo "ERROR: No se pudo descargar el archivo"
            echo ""
            echo "Soluciones:"
            echo "1. Verifica que la URL es correcta"
            echo "2. Asegúrate de que el archivo es público"
            echo "3. Para Google Drive: usa ?export=download&id=FILE_ID"
            echo "4. Para OneDrive: copia el link de descarga directo"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/recovery.img
            artifacts/info.txt
          tag_name: recovery-${{ github.event.inputs.DEVICE }}-${{ github.run_number }}
          body: |
            📱 Recovery Upload Directo
            
            **Dispositivo:** ${{ github.event.inputs.DEVICE_NAME }}
            **Dispositivo Code:** ${{ github.event.inputs.DEVICE }}
            **Descripción:** ${{ github.event.inputs.DESCRIPTION }}
            
            **Descargado desde:** ${{ github.event.inputs.RECOVERY_URL }}
            
            ---
            
            ## 📥 Cómo Instalar
            
            ### Opción 1: Fastboot (Recomendado)
            ```bash
            adb reboot bootloader
            fastboot flash recovery recovery.img
            fastboot reboot
            ```
            
            ### Opción 2: ADB Sideload
            ```bash
            adb reboot recovery
            adb sideload recovery-installer.zip
            ```
            
            ### Opción 3: TWRP/OrangeFox
            1. Copia recovery.img a /sdcard/
            2. Abre TWRP/OrangeFox
            3. Install → Selecciona recovery.img
            4. Flash
            
            ---
            
            **Archivo descargado automáticamente desde la URL proporcionada.**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo ""
          echo "✓ Recovery Upload Completo"
          echo "✓ Disponible en Releases"
          echo "✓ Listo para descargar e instalar"
          echo ""
