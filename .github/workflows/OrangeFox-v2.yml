name: OrangeFox Recovery Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: Rama de OrangeFox
        required: true
        default: OrangeFox-12.1
        type: choice
        options:
          - OrangeFox-12.1
          - OrangeFox-11
          - fox_14.1
      DEVICE_TREE_URL:
        description: URL del arbol
        required: true
        type: string
      DEVICE_TREE_BRANCH:
        description: Rama del arbol
        required: true
        type: string
      DEVICE_PATH:
        description: Ruta del dispositivo
        required: true
        type: string
      DEVICE_CODENAME:
        description: Codename
        required: true
        type: string
      DEVICE_MAKEFILE:
        description: Makefile
        required: true
        type: string
      BUILD_TARGET:
        description: Objetivo
        required: true
        default: recovery
        type: choice
        options:
          - recovery
          - boot
      RECOVERY_INSTALLER:
        description: Crear ZIP
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          git config --global user.email "builder@github.com"
          git config --global user.name "Builder"
          mkdir -p ~/build

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libsdl1.2-dev libssl-dev libtinfo5 libxml2 libxml2-utils lz4 pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-11-jdk-headless python3-dev

      - name: Download Repo
        run: |
          mkdir -p ~/build/bin
          curl --progress-bar https://storage.googleapis.com/git-repo-downloads/repo > ~/build/bin/repo
          chmod a+x ~/build/bin/repo

      - name: Initialize Repo
        run: |
          export PATH=~/build/bin:$PATH
          cd ~/build
          ./bin/repo init -u https://github.com/OrangeFoxRecovery/manifest.git -b ${{ github.event.inputs.MANIFEST_BRANCH }} --depth=1 -q

      - name: Sync Repo
        timeout-minutes: 120
        continue-on-error: true
        run: |
          export PATH=~/build/bin:$PATH
          cd ~/build
          ./bin/repo sync -j8 -c --no-tags --no-clone-bundle --force-sync

      - name: Clone Device Tree
        run: |
          cd ~/build
          DEVICE_DIR="${{ github.event.inputs.DEVICE_PATH }}"
          mkdir -p "$(dirname "$DEVICE_DIR")"
          git clone -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} --depth=1 "${{ github.event.inputs.DEVICE_TREE_URL }}" "$DEVICE_DIR"

      - name: Build Recovery
        timeout-minutes: 300
        run: |
          cd ~/build
          source build/envsetup.sh || true
          lunch fox_${{ github.event.inputs.DEVICE_CODENAME }}-user || true
          make clean || true
          make -j$(nproc --all) ${{ github.event.inputs.BUILD_TARGET }}

      - name: Find Recovery
        id: recovery
        run: |
          cd ~/build
          RECOVERY=$(find out -name "recovery.img" -type f 2>/dev/null | head -1)
          if [ -z "$RECOVERY" ]; then
            RECOVERY=$(find out -name "*RECOVERY*.img" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$RECOVERY" ]; then
            echo "path=$RECOVERY" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      - name: Prepare Artifacts
        run: |
          cd ~/build
          mkdir -p artifacts
          cp ${{ steps.recovery.outputs.path }} artifacts/recovery.img

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ~/build/artifacts/recovery.img
          tag_name: orangefox-${{ github.event.inputs.DEVICE_CODENAME }}-${{ github.run_number }}
          body: "OrangeFox Recovery Build"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
