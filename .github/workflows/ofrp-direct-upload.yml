name: OFRP Builder - Direct File Upload

on:
  workflow_dispatch:
    inputs:
      DEVICE_CODENAME:
        description: 'Codename del dispositivo'
        required: true
        type: string
        default: 'cap_sprout'
      ANDROID_VERSION:
        description: 'Versión Android'
        required: true
        type: choice
        options:
          - '12'
          - '13'
          - '14'
          - '15'
      IMAGE_TYPE:
        description: 'Tipo de imagen'
        required: true
        type: choice
        options:
          - recovery
          - boot
          - vendor_boot
      SCREEN_RES_X:
        description: 'Resolución X (ej: 720)'
        required: true
        type: string
        default: '720'
      SCREEN_RES_Y:
        description: 'Resolución Y (ej: 1600)'
        required: true
        type: string
        default: '1600'
      IS_AB_DEVICE:
        description: '¿Es dispositivo A/B?'
        required: false
        type: choice
        options:
          - 'no'
          - 'yes'
      TOUCH_DRIVERS:
        description: 'Drivers de touch (opcional)'
        required: false
        type: string
      REDUCE_SIZE:
        description: 'Reducir tamaño OFRP'
        required: false
        type: choice
        options:
          - 'no'
          - 'yes'
          - 'yesx'
          - 'yesxx'

jobs:
  upload-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Upload Artifact Action
        uses: actions/upload-artifact@v3
        with:
          name: recovery-upload
          path: artifacts/
          retention-days: 1

      - name: Show Configuration
        run: |
          echo "=========================================="
          echo "OFRP BUILDER - Direct File Upload"
          echo "=========================================="
          echo ""
          echo "Dispositivo: ${{ github.event.inputs.DEVICE_CODENAME }}"
          echo "Android: ${{ github.event.inputs.ANDROID_VERSION }}"
          echo "Imagen: ${{ github.event.inputs.IMAGE_TYPE }}"
          echo "Resolución: ${{ github.event.inputs.SCREEN_RES_X }}x${{ github.event.inputs.SCREEN_RES_Y }}"
          echo ""
          echo "✓ Workflow listo para recibir archivos"
          echo ""
          echo "INSTRUCCIONES:"
          echo "1. Después de ejecutar este workflow"
          echo "2. Ve a la sección 'Artifacts'"
          echo "3. Descarga 'recovery-upload'"
          echo "4. Coloca tu recovery.img en esa carpeta"
          echo "5. Ejecuta nuevamente el workflow"
          echo ""

      - name: Create Info File
        run: |
          mkdir -p artifacts
          
          cat > artifacts/README.txt << 'EOF'
          =============================================
          OFRP DIRECT FILE UPLOAD
          =============================================
          
          INSTRUCCIONES:
          
          1. Descarga este artifact (recovery-upload.zip)
          
          2. Descomprime y coloca tu archivo:
             - recovery.img (para modo recovery)
             - boot.img (para modo boot)
             - vendor_boot.img (para modo vendor_boot)
          
          3. Re-comprime todo como recovery-upload.zip
          
          4. Sube el ZIP modificado a:
             Tu Repositorio → Actions → Artifacts
          
          5. En el siguiente workflow run, habrá acceso
             al archivo que subiste
          
          =============================================
          ALTERNATIVA - RECOMENDADO:
          =============================================
          
          Ve a tu repositorio de GitHub
          
          Click en: Code → Add file → Upload files
          
          Sube tu recovery.img directamente
          
          Luego ejecuta este workflow
          
          =============================================
          EOF
          
          cat > artifacts/INSTRUCCIONES.md << 'EOF'
          # OFRP Direct Upload - Guía

          ## Método 1: Upload Directo en GitHub Web (MÁS FÁCIL)

          ```
          1. Tu Repositorio en GitHub
          2. Code → Add file → Upload files
          3. Arrastra recovery.img
          4. Commit
          5. Actions → OFRP Builder
          6. Run workflow
          ```

          ## Método 2: Via Artifacts

          ```
          1. Descarga artifacts
          2. Coloca recovery.img
          3. Sube artifacts modificados
          4. Run workflow
          ```

          ## Método 3: Via Git (Desde tu PC)

          ```bash
          cp recovery.img ./recovery.img
          git add recovery.img
          git commit -m "Add recovery image"
          git push origin main
          ```

          EOF

      - name: List Instructions
        run: ls -lah artifacts/

      - name: Upload Artifacts for Download
        uses: actions/upload-artifact@v3
        with:
          name: recovery-upload-template
          path: artifacts/
          retention-days: 7

      - name: Summary
        run: |
          echo ""
          echo "✓ Instrucciones creadas"
          echo "✓ Descarga los artifacts para ver opciones"
          echo "✓ La mejor opción es subir via GitHub Web"
          echo ""
