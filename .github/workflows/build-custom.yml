name: Build Custom Recovery

on:
  workflow_dispatch:
    inputs:
      MODE:
        description: 'Selecciona el modo'
        required: true
        type: choice
        options:
          - compile
          - download
      DEVICE:
        description: 'Selecciona tu dispositivo'
        required: true
        type: choice
        options:
          - nokia_cap_sprout
          - xiaomi_joyeuse
          - samsung_d1
          - xiaomi_alioth
          - xiaomi_surya
      RECOVERY_URL:
        description: 'URL de recovery original (solo modo download)'
        required: false
        type: string
        default: 'https://example.com/recovery.img'
      MANIFEST_BRANCH:
        description: 'Rama de OrangeFox (solo modo compile)'
        required: false
        type: choice
        options:
          - OrangeFox-12.1
          - OrangeFox-11
          - fox_14.1
      BUILD_TARGET:
        description: 'Objetivo de compilacion (solo modo compile)'
        required: false
        default: 'recovery'
        type: choice
        options:
          - recovery
          - boot

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      device_name: ${{ steps.config.outputs.device_name }}
      tree_url: ${{ steps.config.outputs.tree_url }}
      device_path: ${{ steps.config.outputs.device_path }}
      codename: ${{ steps.config.outputs.codename }}
      makefile: ${{ steps.config.outputs.makefile }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Load Device Config
        id: config
        run: |
          DEVICE="${{ github.event.inputs.DEVICE }}"
          
          if [ ! -f "devices/devices.json" ]; then
            echo "ERROR: devices/devices.json no encontrado"
            exit 1
          fi
          
          CONFIG=$(cat devices/devices.json | jq -r ".\"$DEVICE\"")
          
          if [ "$CONFIG" == "null" ]; then
            echo "ERROR: Dispositivo no encontrado: $DEVICE"
            exit 1
          fi
          
          DEVICE_NAME=$(echo $CONFIG | jq -r '.name')
          TREE_URL=$(echo $CONFIG | jq -r '.tree_url')
          DEVICE_PATH=$(echo $CONFIG | jq -r '.device_path')
          CODENAME=$(echo $CONFIG | jq -r '.codename')
          MAKEFILE=$(echo $CONFIG | jq -r '.makefile')
          
          echo "device_name=$DEVICE_NAME" >> $GITHUB_OUTPUT
          echo "tree_url=$TREE_URL" >> $GITHUB_OUTPUT
          echo "device_path=$DEVICE_PATH" >> $GITHUB_OUTPUT
          echo "codename=$CODENAME" >> $GITHUB_OUTPUT
          echo "makefile=$MAKEFILE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "✓ Dispositivo: $DEVICE_NAME"
          echo "✓ Codename: $CODENAME"
          echo "✓ Modo: ${{ github.event.inputs.MODE }}"

  download-mode:
    if: github.event.inputs.MODE == 'download'
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Show Info
        run: |
          echo "===================================="
          echo "MODO: Descargar Recovery Original"
          echo "===================================="
          echo ""
          echo "Dispositivo: ${{ needs.setup.outputs.device_name }}"
          echo "Codename: ${{ needs.setup.outputs.codename }}"
          echo "URL: ${{ github.event.inputs.RECOVERY_URL }}"
          echo ""

      - name: Download Recovery
        run: |
          mkdir -p artifacts
          echo "Descargando recovery desde:"
          echo "${{ github.event.inputs.RECOVERY_URL }}"
          echo ""
          
          curl -L -o artifacts/recovery.img "${{ github.event.inputs.RECOVERY_URL }}"
          
          if [ ! -f artifacts/recovery.img ]; then
            echo "ERROR: No se pudo descargar el archivo"
            exit 1
          fi
          
          SIZE=$(du -h artifacts/recovery.img | cut -f1)
          MD5=$(md5sum artifacts/recovery.img | awk '{print $1}')
          
          echo ""
          echo "✓ Descargado exitosamente"
          echo "✓ Tamaño: $SIZE"
          echo "✓ MD5: $MD5"
          
          echo "recovery_md5=$MD5" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/recovery.img
          tag_name: recovery-${{ needs.setup.outputs.codename }}-download-${{ github.run_number }}
          body: |
            Recovery Original Descargado
            
            Dispositivo: ${{ needs.setup.outputs.device_name }}
            Codename: ${{ needs.setup.outputs.codename }}
            Modo: Descargado (Original)
            
            URL Original: ${{ github.event.inputs.RECOVERY_URL }}
            MD5: ${{ env.recovery_md5 }}
            
            **Instalación:**
            ```bash
            adb reboot bootloader
            fastboot flash recovery recovery.img
            fastboot reboot
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Summary Download
        if: always()
        run: |
          echo ""
          echo "✓ Recovery Original Descargado"
          echo "✓ Publicado en Releases"
          echo "✓ Listo para instalar"
          echo ""

  compile-mode:
    if: github.event.inputs.MODE == 'compile'
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Show Info
        run: |
          echo "===================================="
          echo "MODO: Compilar Recovery Personalizado"
          echo "===================================="
          echo ""
          echo "Dispositivo: ${{ needs.setup.outputs.device_name }}"
          echo "Codename: ${{ needs.setup.outputs.codename }}"
          echo "Rama: ${{ github.event.inputs.MANIFEST_BRANCH }}"
          echo "Objetivo: ${{ github.event.inputs.BUILD_TARGET }}"
          echo ""

      - name: Install Dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses6 lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libtinfo-dev libxml2 libxml2-utils lzop make ncurses-dev openjdk-11-jdk-headless patch pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3-dev

      - name: Setup Build Environment
        run: |
          git config --global user.email "builder@github.com"
          git config --global user.name "RecoveryBuilder"
          mkdir -p ~/build
          mkdir -p ~/build/bin

      - name: Download Repo Tool
        run: |
          curl --progress-bar https://storage.googleapis.com/git-repo-downloads/repo > ~/build/bin/repo
          chmod a+x ~/build/bin/repo

      - name: Initialize Repo
        run: |
          export PATH=~/build/bin:$PATH
          cd ~/build
          ./bin/repo init -u https://github.com/OrangeFoxRecovery/manifest.git -b ${{ github.event.inputs.MANIFEST_BRANCH }} --depth=1 -q

      - name: Sync Repository
        timeout-minutes: 120
        continue-on-error: true
        run: |
          export PATH=~/build/bin:$PATH
          cd ~/build
          ./bin/repo sync -j8 -c --no-tags --no-clone-bundle --force-sync 2>&1 | tail -20

      - name: Clone Device Tree
        run: |
          cd ~/build
          DEVICE_DIR="${{ needs.setup.outputs.device_path }}"
          mkdir -p "$(dirname "$DEVICE_DIR")"
          git clone -b ${{ github.event.inputs.MANIFEST_BRANCH }} --depth=1 "${{ needs.setup.outputs.tree_url }}" "$DEVICE_DIR" 2>&1 | tail -10

      - name: Setup Build
        run: |
          cd ~/build
          source build/envsetup.sh > /dev/null 2>&1 || true
          lunch fox_${{ needs.setup.outputs.codename }}-user > /dev/null 2>&1 || true

      - name: Build Recovery
        timeout-minutes: 300
        run: |
          cd ~/build
          make clean > /dev/null 2>&1 || true
          make -j$(nproc --all) ${{ github.event.inputs.BUILD_TARGET }} 2>&1 | tail -100

      - name: Find Recovery Image
        id: recovery
        run: |
          cd ~/build
          RECOVERY=$(find out -name "recovery.img" -type f 2>/dev/null | head -1)
          if [ -z "$RECOVERY" ]; then
            RECOVERY=$(find out -name "*RECOVERY*.img" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$RECOVERY" ]; then
            SIZE=$(du -h "$RECOVERY" | cut -f1)
            MD5=$(md5sum "$RECOVERY" | awk '{print $1}')
            echo "path=$RECOVERY" >> $GITHUB_OUTPUT
            echo "size=$SIZE" >> $GITHUB_OUTPUT
            echo "md5=$MD5" >> $GITHUB_OUTPUT
            echo "✓ Recovery encontrado: $RECOVERY ($SIZE)"
          else
            echo "ERROR: Recovery no encontrado"
            exit 1
          fi

      - name: Prepare Artifacts
        run: |
          cd ~/build
          mkdir -p artifacts
          cp ${{ steps.recovery.outputs.path }} artifacts/recovery.img
          ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ~/build/artifacts/recovery.img
          tag_name: recovery-${{ needs.setup.outputs.codename }}-compile-${{ github.run_number }}
          body: |
            Recovery Compilado Personalizado
            
            Dispositivo: ${{ needs.setup.outputs.device_name }}
            Codename: ${{ needs.setup.outputs.codename }}
            Rama: ${{ github.event.inputs.MANIFEST_BRANCH }}
            Objetivo: ${{ github.event.inputs.BUILD_TARGET }}
            Modo: Compilado (Personalizado)
            
            Tamaño: ${{ steps.recovery.outputs.size }}
            MD5: ${{ steps.recovery.outputs.md5 }}
            
            **Instalación:**
            ```bash
            adb reboot bootloader
            fastboot flash recovery recovery.img
            fastboot reboot
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Summary Compile
        if: always()
        run: |
          echo ""
          echo "✓ Recovery Compilado Exitosamente"
          echo "✓ Publicado en Releases"
          echo "✓ Listo para instalar"
          echo ""
